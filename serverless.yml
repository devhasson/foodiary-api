org: devhasson
service: foodiary-api

provider:
  name: aws
  region: us-east-1
  runtime: nodejs24.x
  memorySize: 128
  stage: ${opt:stage, 'dev'}
  environment: ${file(./sls/config/env.yml)}

package:
  individually: true

custom:
  cognito:
    PoolName: ${self:service}-${self:provider.stage}-UserPool
    ClientName: ${self:service}-${self:provider.stage}-UserPoolClient
  dynamoDb:
    MainTable: ${self:service}-${self:provider.stage}-MainTable

build:
  esbuild:
    configFile: ./esbuild.config.mjs

resources:
  - ${file(./sls/resources/UserPool.yml)}
  - ${file(./sls/resources/MainTable.yml)}

functions:
  - ${file(./sls/functions/auth.yml)}
